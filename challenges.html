<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoLearn - Challenges</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">EcoLearn</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="lessons.html">Lessons</a>
      <a href="quiz.html">Quiz</a>
      <a href="challenges.html">Challenges</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="page">
    <h2>Eco-Challenges</h2>
    <div class="cards">
      <div class="card">
        <h3>Challenge 1</h3>
        <p>Bring a reusable water bottle for 5 days.</p>
        <button class="btn small" onclick="addPoints(10)">Complete</button>
      </div>
      <div class="card">
        <h3>Challenge 2</h3>
        <p>Separate wet and dry waste at home for one week.</p>
        <button class="btn small" onclick="addPoints(10)">Complete</button>
      </div>
      <div class="card">
        <h3>Challenge 3</h3>
        <p>Plant one tree or report a planted sapling.</p>
        <button class="btn small" onclick="addPoints(15)">Complete</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
