<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoLearn - Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">EcoLearn</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="lessons.html">Lessons</a>
      <a href="quiz.html">Quiz</a>
      <a href="challenges.html">Challenges</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="page">
    <h2>Quick Quiz</h2>

    <div class="card quiz-box">
      <p>1. Which of these is recyclable?</p>
      <label><input type="radio" name="q1" value="wrong"> Banana peel</label>
      <label><input type="radio" name="q1" value="correct"> Plastic bottle</label>
      <label><input type="radio" name="q1" value="wrong"> Food waste</label>

      <p>2. What helps save water?</p>
      <label><input type="radio" name="q2" value="correct"> Turning off the tap while brushing</label>
      <label><input type="radio" name="q2" value="wrong"> Leaving tap open</label>
      <label><input type="radio" name="q2" value="wrong"> Washing one item at a time</label>

      <p>3. Which gas is linked to climate change?</p>
      <label><input type="radio" name="q3" value="correct"> Carbon dioxide</label>
      <label><input type="radio" name="q3" value="wrong"> Oxygen</label>
      <label><input type="radio" name="q3" value="wrong"> Helium</label>

      <button class="btn" onclick="checkQuiz()">Submit Quiz</button>
      <p id="result"></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
